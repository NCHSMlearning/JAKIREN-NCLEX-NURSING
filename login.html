<!DOCTYPE html>
<html lang="en"> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jakiren NCLEX Nursing - Login</title>
   <script src="https://unpkg.com/@supabase/supabase-js@1.35.0/dist/umd/supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2b3d 0%, #1b4f6e 50%, #2a6f8f 100%);
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #0f2b3d 0%, #1b4f6e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #64748b;
            font-size: 14px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab-btn.active {
            color: #1b4f6e;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #1b4f6e, #2a6f8f);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #2a6f8f;
            box-shadow: 0 0 0 3px rgba(42, 111, 143, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1b4f6e 0%, #2a6f8f 100%);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(27, 79, 110, 0.3);
        }
        
        .features {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: #475569;
            font-size: 14px;
        }
        
        .feature-icon {
            font-size: 18px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>🏥 JAKIREN NCLEX</h1>
                <p>Premium Nursing Preparation Course</p>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <div id="loginTab" class="tab-content active">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="login-btn" onclick="handleLogin()">Login to Dashboard →</button>
            </div>
            
            <div id="registerTab" class="tab-content">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)">
                </div>
                <button class="login-btn" onclick="handleRegister()">Create Account →</button>
            </div>
            
            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">🎓</span>
                    <span>180+ Lectures • 6 Months Program</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🎁</span>
                    <span>First Lecture FREE</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📱</span>
                    <span>Pay per Lecture • M-Pesa & Card</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🏆</span>
                    <span>NCLEX Exam Focused Content</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
<script>
    // YOUR SUPABASE CREDENTIALS
    const SUPABASE_URL = 'https://fbsnnsnebzzedypqbbip.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZic25uc25lYnp6ZWR5cHFiYmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzY0NzAsImV4cCI6MjA5MzU1MjQ3MH0.9S0RCSCmdYkwJCi1WM-_75-1LKucxL4y-HNMMexB1Fk';
    
    // CORRECT WAY to initialize Supabase v2
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    console.log('Supabase client created');
    console.log('supabase.auth exists?', typeof supabase.auth);
    console.log('supabase.from exists?', typeof supabase.from);
    
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = isError ? '#dc3545' : '#2e8b57';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function switchTab(tab) {
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const btns = document.querySelectorAll('.tab-btn');
        
        btns.forEach(btn => btn.classList.remove('active'));
        
        if (tab === 'login') {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            btns[0].classList.add('active');
        } else {
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
            btns[1].classList.add('active');
        }
    }
    
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showToast('Please fill in all fields', true);
            return;
        }
        
        console.log('Attempting login for:', email);
        
        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                console.error('Login error:', error);
                showToast(error.message, true);
                return;
            }
            
            console.log('Login success!', data.user.email);
            showToast('Login successful! Redirecting...');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } catch (err) {
            console.error('Unexpected error:', err);
            showToast('An error occurred. Please try again.', true);
        }
    }
    
    async function handleRegister() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        
        if (!name || !email || !password) {
            showToast('Please fill in all fields', true);
            return;
        }
        
        if (password.length < 6) {
            showToast('Password must be at least 6 characters', true);
            return;
        }
        
        console.log('Attempting registration for:', email);
        
        try {
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: name }
                }
            });
            
            if (authError) {
                console.error('Registration error:', authError);
                showToast(authError.message, true);
                return;
            }
            
            console.log('Registration success! User ID:', authData.user?.id);
            showToast('Registration successful! Please login.');
            switchTab('login');
            document.getElementById('regName').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
        } catch (err) {
            console.error('Unexpected error:', err);
            showToast('An error occurred. Please try again.', true);
        }
    }
    
    // Check if already logged in
    async function checkExistingSession() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                console.log('Existing session found, redirecting to dashboard');
                window.location.href = 'dashboard.html';
            } else {
                console.log('No existing session, showing login form');
            }
        } catch (err) {
            console.log('Error checking session:', err);
        }
    }
    
    checkExistingSession();
</script>
</body>
</html>
