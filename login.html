<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Jakiren NCLEX Nursing - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0f2b3d 0%, #1b4f6e 50%, #2a6f8f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 48px;
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #0f2b3d, #2a6f8f);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #64748b;
            font-size: 14px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 60px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #64748b;
            border-radius: 50px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: white;
            color: #1b4f6e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #2a6f8f;
            box-shadow: 0 0 0 4px rgba(42,111,143,0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1b4f6e, #2a6f8f);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(27,79,110,0.3);
        }
        
        .features {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 2px solid #f1f5f9;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
            font-size: 13px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 50px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 14px;
            z-index: 2000;
            transition: all 0.3s;
            pointer-events: none;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        @media (max-width: 640px) {
            .login-card {
                padding: 32px 24px;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .logo h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🏥</div>
            <h1>JAKIREN NCLEX</h1>
            <p>Premium Nursing Preparation Course</p>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" id="loginTabBtn">Login</button>
            <button class="tab-btn" id="registerTabBtn">Register</button>
        </div>
        
        <div id="loginForm" class="tab-content active">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button class="login-btn" id="loginButton">Login →</button>
        </div>
        
        <div id="registerForm" class="tab-content">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Min 6 characters">
            </div>
            <button class="login-btn" id="registerButton">Create Account →</button>
        </div>
        
        <div class="features">
            <div class="feature-item">🎓 180+ Lectures • 6 Months</div>
            <div class="feature-item">🎁 First Lecture FREE</div>
            <div class="feature-item">📱 M-Pesa & Card</div>
            <div class="feature-item">🏆 NCLEX Focused</div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // Wait for DOM to fully load
        document.addEventListener('DOMContentLoaded', function() {
            
            // Supabase config
            const SUPABASE_URL = 'https://fbsnnsnebzzedypqbbip.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZic25uc25lYnp6ZWR5cHFiYmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzY0NzAsImV4cCI6MjA5MzU1MjQ3MH0.9S0RCSCmdYkwJCi1WM-_75-1LKucxL4y-HNMMexB1Fk';
            
            // Create Supabase client
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            console.log('App started');
            
            // Show toast message
            function showToast(message, isError = false) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.style.backgroundColor = isError ? '#dc3545' : '#2e8b57';
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
            
            // Switch tabs
            function switchToLogin() {
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('registerForm').classList.remove('active');
                document.getElementById('loginTabBtn').classList.add('active');
                document.getElementById('registerTabBtn').classList.remove('active');
            }
            
            function switchToRegister() {
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('registerForm').classList.add('active');
                document.getElementById('loginTabBtn').classList.remove('active');
                document.getElementById('registerTabBtn').classList.add('active');
            }
            
            // Login handler
            async function handleLogin() {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                if (!email || !password) {
                    showToast('Please enter email and password', true);
                    return;
                }
                
                console.log('Logging in:', email);
                
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    showToast(error.message, true);
                    console.error('Login error:', error);
                    return;
                }
                
                showToast('Login successful! Redirecting...');
                console.log('Logged in:', data.user.email);
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
            
            // Register handler
            async function handleRegister() {
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const password = document.getElementById('regPassword').value;
                
                if (!name || !email || !password) {
                    showToast('Please fill all fields', true);
                    return;
                }
                
                if (password.length < 6) {
                    showToast('Password must be at least 6 characters', true);
                    return;
                }
                
                console.log('Registering:', email);
                
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { full_name: name }
                    }
                });
                
                if (error) {
                    showToast(error.message, true);
                    console.error('Register error:', error);
                    return;
                }
                
                showToast('Registration successful! Please login.');
                console.log('Registered:', data.user?.email);
                
                // Clear form
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                
                // Switch to login
                switchToLogin();
            }
            
            // Check if already logged in
            async function checkSession() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    console.log('Already logged in, redirecting...');
                    window.location.href = 'dashboard.html';
                }
            }
            
            // Attach event listeners
            document.getElementById('loginTabBtn').onclick = switchToLogin;
            document.getElementById('registerTabBtn').onclick = switchToRegister;
            document.getElementById('loginButton').onclick = handleLogin;
            document.getElementById('registerButton').onclick = handleRegister;
            
            // Enter key support
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const isLoginActive = document.getElementById('loginForm').classList.contains('active');
                    if (isLoginActive) {
                        handleLogin();
                    } else {
                        handleRegister();
                    }
                }
            });
            
            // Check session on load
            checkSession();
            
        });
    </script>
</body>
</html>
