    <script>
        // ==================== PROFESSIONAL NCLEX DASHBOARD ====================
        (function() {
            // Supabase Configuration
            const SUPABASE_URL = 'https://fbsnnsnebzzedypqbbip.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZic25uc25lYnp6ZWR5cHFiYmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzY0NzAsImV4cCI6MjA5MzU1MjQ3MH0.9S0RCSCmdYkwJCi1WM-_75-1LKucxL4y-HNMMexB1Fk';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Global State
            let currentUser = null;
            let allLectures = [];
            let userPurchases = [];
            let currentFilter = 'all';
            let currentMonth = 'all';
            let pendingLecture = null;
            let currentTab = 'dashboard';
            
            // Helper Functions
            function showToast(message, isError = false) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.className = 'toast show';
                toast.style.backgroundColor = isError ? '#dc3545' : '#1f8a5c';
                setTimeout(() => toast.classList.remove('show'), 3500);
            }
            
            function showModal(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) modal.style.display = 'flex';
            }
            
            window.closeModal = function(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) modal.style.display = 'none';
            };
            
            function formatCurrency(amount) {
                return `KES ${amount.toLocaleString()}`;
            }
            
            function getMonthName(month) {
                const months = {
                    1: '📘 Fundamentals',
                    2: '💉 Medical-Surgical',
                    3: '💊 Pharmacology',
                    4: '🤰 Maternity & Pediatrics',
                    5: '🧠 Psychiatric Nursing',
                    6: '⭐ Final Review'
                };
                return months[month] || `Month ${month}`;
            }
            
            // Authentication
            async function checkAuth() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    window.location.href = 'login.html';
                    return null;
                }
                currentUser = user;
                const displayName = user.user_metadata?.full_name || user.email.split('@')[0];
                document.getElementById('welcomeNameShort').innerHTML = displayName;
                document.getElementById('sidebarUserName').innerHTML = displayName;
                document.getElementById('userAvatar').innerHTML = displayName.charAt(0).toUpperCase();
                return user;
            }
            
            window.logout = async function() {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            };
            
            // Data Loading
            async function loadLectures() {
                const { data } = await supabase.from('lectures').select('*').order('lecture_number');
                if (data) allLectures = data;
                return allLectures;
            }
            
            async function loadUserPurchases() {
                if (!currentUser) return [];
                const { data } = await supabase.from('user_purchases').select('lecture_id').eq('user_id', currentUser.id);
                userPurchases = data ? data.map(p => p.lecture_id) : [];
                return userPurchases;
            }
            
            // ============ RENDER DASHBOARD VIEW ============
            async function renderDashboard() {
                const contentDiv = document.getElementById('dynamicContent');
                if (!contentDiv) return;
                
                contentDiv.innerHTML = `
                    <!-- Welcome Banner -->
                    <div class="welcome-banner">
                        <div class="welcome-text">
                            <h2>Welcome back, <span id="welcomeName">${currentUser?.user_metadata?.full_name || currentUser?.email?.split('@')[0] || 'Nurse'}</span>! 👋</h2>
                            <p>Continue your NCLEX journey. You're making great progress toward becoming a registered nurse!</p>
                            <div class="motivation-tag">⭐ 180 Lectures • 6 Months Premium Access</div>
                        </div>
                        <div class="streak-badge">
                            <i class="fas fa-calendar-week"></i>
                            <div class="streak-number">🔥</div>
                            <small>NCLEX Ready</small>
                        </div>
                    </div>

                    <!-- Statistics Grid -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-lock-open"></i></div>
                            <div class="stat-number" id="purchasedCount">0</div>
                            <div class="stat-label">Lectures Unlocked</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-coins"></i></div>
                            <div class="stat-number" id="totalSpent">KES 0</div>
                            <div class="stat-label">Total Investment</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-hourglass-half"></i></div>
                            <div class="stat-number" id="remainingLectures">180</div>
                            <div class="stat-label">Remaining Lectures</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-chart-line"></i></div>
                            <div class="stat-number" id="progressPercent">0%</div>
                            <div class="stat-label">Overall Progress</div>
                        </div>
                    </div>

                    <!-- Detailed Progress Section -->
                    <div class="progress-section">
                        <div class="progress-header">
                            <div class="progress-label"><i class="fas fa-chart-simple"></i> Course Completion Tracker</div>
                            <div class="progress-value" id="progressPercentLabel">0% Complete</div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="progressBar"></div>
                        </div>
                        <div class="progress-details">
                            <span id="progressDetailText">🎯 Unlock more lectures to advance your NCLEX prep</span>
                        </div>
                    </div>

                    <!-- Featured Topics (NCLEX Focus Areas) -->
                    <div class="featured-section">
                        <h3><i class="fas fa-bullseye"></i> NCLEX Exam Focus Areas</h3>
                        <div class="featured-grid">
                            <div class="featured-item"><i class="fas fa-capsules"></i> Pharmacology</div>
                            <div class="featured-item"><i class="fas fa-stethoscope"></i> Medical-Surgical</div>
                            <div class="featured-item"><i class="fas fa-baby-carriage"></i> Maternity Nursing</div>
                            <div class="featured-item"><i class="fas fa-child"></i> Pediatric Nursing</div>
                            <div class="featured-item"><i class="fas fa-brain"></i> Psychiatric Nursing</div>
                            <div class="featured-item"><i class="fas fa-gavel"></i> Legal & Ethics</div>
                            <div class="featured-item"><i class="fas fa-lungs"></i> Respiratory</div>
                            <div class="featured-item"><i class="fas fa-heartbeat"></i> Cardiovascular</div>
                        </div>
                    </div>
                `;
                
                await updateStats();
            }
            
            // ============ RENDER LECTURES VIEW ============
            async function renderLectures() {
                const contentDiv = document.getElementById('dynamicContent');
                if (!contentDiv) return;
                
                // Create lectures UI
                contentDiv.innerHTML = `
                    <div class="filter-bar">
                        <div class="filter-buttons">
                            <button class="filter-btn active" data-filter="all"><i class="fas fa-list"></i> All</button>
                            <button class="filter-btn" data-filter="unlocked"><i class="fas fa-check-circle"></i> Unlocked</button>
                            <button class="filter-btn" data-filter="locked"><i class="fas fa-lock"></i> Locked</button>
                        </div>
                        <select id="monthFilter" class="month-select">
                            <option value="all">📅 All Months</option>
                            <option value="1">📘 Month 1: Fundamentals</option>
                            <option value="2">💉 Month 2: Medical-Surgical</option>
                            <option value="3">💊 Month 3: Pharmacology</option>
                            <option value="4">🤰 Month 4: Maternity & Pediatrics</option>
                            <option value="5">🧠 Month 5: Psychiatric Nursing</option>
                            <option value="6">⭐ Month 6: Final Review</option>
                        </select>
                    </div>
                    <div class="lectures-grid" id="lecturesGrid">
                        <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading lectures...</div>
                    </div>
                `;
                
                // Load data if needed
                if (!allLectures.length) await loadLectures();
                if (!userPurchases.length && currentUser) await loadUserPurchases();
                
                // Render lectures grid
                await renderLecturesGrid();
                
                // Attach filter events
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.onclick = () => {
                        currentFilter = btn.getAttribute('data-filter');
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderLecturesGrid();
                    };
                });
                document.getElementById('monthFilter').onchange = () => {
                    currentMonth = document.getElementById('monthFilter').value;
                    renderLecturesGrid();
                };
            }
            
            async function renderLecturesGrid() {
                const grid = document.getElementById('lecturesGrid');
                if (!grid) return;
                
                let filtered = [...allLectures];
                if (currentMonth !== 'all') filtered = filtered.filter(l => l.month === parseInt(currentMonth));
                if (currentFilter === 'unlocked') filtered = filtered.filter(l => userPurchases.includes(l.id));
                if (currentFilter === 'locked') filtered = filtered.filter(l => !userPurchases.includes(l.id) && !l.is_free);
                
                if (!filtered.length) {
                    grid.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><p>No lectures found</p></div>';
                    return;
                }
                
                grid.innerHTML = filtered.map(lecture => {
                    const isPurchased = userPurchases.includes(lecture.id);
                    const canAccess = isPurchased || lecture.is_free;
                    
                    let badge = '';
                    if (lecture.is_free) badge = '<span class="badge badge-free">🎁 FREE</span>';
                    else if (isPurchased) badge = '<span class="badge badge-unlocked">✅ UNLOCKED</span>';
                    else badge = '<span class="badge badge-locked">🔒 LOCKED</span>';
                    
                    let priceHtml = '';
                    if (!lecture.is_free && !isPurchased) {
                        priceHtml = `<div class="lecture-price">${formatCurrency(lecture.price)}</div>`;
                    }
                    
                    return `
                        <div class="lecture-card ${!canAccess ? 'locked' : ''}">
                            ${badge}
                            <div class="lecture-number">Lecture ${lecture.lecture_number} • ${getMonthName(lecture.month)}</div>
                            <div class="lecture-title">${lecture.title}</div>
                            <div class="lecture-duration"><i class="far fa-clock"></i> ${lecture.duration || '2 hours'}</div>
                            ${priceHtml}
                            ${canAccess ? 
                                `<button class="watch-btn" onclick="window.watchLecture(${lecture.id})"><i class="fas fa-play"></i> Watch Lecture</button>` : 
                                `<button class="unlock-btn" onclick='window.initiateUnlock(${JSON.stringify(lecture).replace(/'/g, "&#39;")})'><i class="fas fa-key"></i> Unlock ${formatCurrency(lecture.price)}</button>`
                            }
                        </div>
                    `;
                }).join('');
            }
            
            // ============ RENDER PROGRESS VIEW ============
            async function renderProgress() {
                const contentDiv = document.getElementById('dynamicContent');
                if (!contentDiv) return;
                
                const purchasedCount = userPurchases.length;
                const totalLectures = allLectures.length || 180;
                const percentComplete = Math.round((purchasedCount / totalLectures) * 100);
                
                // Calculate progress by month
                let monthsHtml = '';
                for (let i = 1; i <= 6; i++) {
                    const monthLectures = allLectures.filter(l => l.month === i);
                    const monthUnlocked = monthLectures.filter(l => userPurchases.includes(l.id)).length;
                    const monthPercent = monthLectures.length > 0 ? Math.round((monthUnlocked / monthLectures.length) * 100) : 0;
                    monthsHtml += `
                        <div style="margin-bottom: 20px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                                <span><strong>${getMonthName(i)}</strong></span>
                                <span>${monthUnlocked}/${monthLectures.length} lectures (${monthPercent}%)</span>
                            </div>
                            <div class="progress-bar-container" style="height: 10px;">
                                <div class="progress-bar-fill" style="width: ${monthPercent}%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light));"></div>
                            </div>
                        </div>
                    `;
                }
                
                contentDiv.innerHTML = `
                    <div class="progress-overview" style="background: white; border-radius: 24px; padding: 28px; margin-bottom: 24px;">
                        <h2><i class="fas fa-chart-line"></i> Your NCLEX Progress</h2>
                        <div class="progress-header" style="margin: 20px 0 10px;">
                            <span class="progress-label">Overall Course Completion</span>
                            <span class="progress-value">${percentComplete}%</span>
                        </div>
                        <div class="progress-bar-container" style="height: 20px;">
                            <div class="progress-bar-fill" style="width: ${percentComplete}%; height: 100%;"></div>
                        </div>
                        <p style="margin-top: 16px; color: var(--gray);">
                            <i class="fas fa-check-circle" style="color: var(--success);"></i> 
                            ${purchasedCount} of ${totalLectures} lectures completed
                        </p>
                    </div>
                    
                    <div class="stats-grid" style="margin-bottom: 24px;">
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-clock"></i></div>
                            <div class="stat-number">${Math.floor(purchasedCount * 2)} hrs</div>
                            <div class="stat-label">Study Time</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-fire"></i></div>
                            <div class="stat-number">${Math.floor(percentComplete / 10)}</div>
                            <div class="stat-label">Day Streak</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon-wrapper"><i class="fas fa-trophy"></i></div>
                            <div class="stat-number">${Math.floor(percentComplete / 20)}</div>
                            <div class="stat-label">Achievements</div>
                        </div>
                    </div>
                    
                    <div style="background: white; border-radius: 24px; padding: 28px;">
                        <h3><i class="fas fa-chart-simple"></i> Progress by Month</h3>
                        <div style="margin-top: 20px;">${monthsHtml}</div>
                    </div>
                `;
            }
            
            // ============ RENDER CERTIFICATES VIEW ============
            async function renderCertificates() {
                const contentDiv = document.getElementById('dynamicContent');
                if (!contentDiv) return;
                
                const purchasedCount = userPurchases.length;
                const totalLectures = allLectures.length || 180;
                const percentComplete = Math.round((purchasedCount / totalLectures) * 100);
                const isComplete = percentComplete === 100;
                
                contentDiv.innerHTML = `
                    <div style="background: white; border-radius: 24px; padding: 28px; margin-bottom: 24px; text-align: center;">
                        <i class="fas fa-certificate" style="font-size: 64px; color: var(--primary); margin-bottom: 16px;"></i>
                        <h2>Your Achievement Certificates</h2>
                        <p style="color: var(--gray);">Complete milestones to earn certificates and badges</p>
                    </div>
                    
                    ${isComplete ? `
                        <div style="background: linear-gradient(135deg, var(--success), var(--success-light)); border-radius: 24px; padding: 32px; margin-bottom: 24px; text-align: center; color: white;">
                            <i class="fas fa-trophy" style="font-size: 48px; margin-bottom: 16px;"></i>
                            <h2 style="color: white;">🎉 NCLEX Master Certificate 🎉</h2>
                            <p>Congratulations! You've completed all ${totalLectures} lectures!</p>
                            <button class="btn btn-primary" style="margin-top: 16px; background: white; color: var(--success);" onclick="alert('Certificate download feature coming soon!')">
                                <i class="fas fa-download"></i> Download Certificate
                            </button>
                        </div>
                    ` : `
                        <div style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 24px; padding: 28px; margin-bottom: 24px; color: white;">
                            <h3>Progress to Certificate</h3>
                            <div class="progress-bar-container" style="margin: 16px 0;">
                                <div class="progress-bar-fill" style="width: ${percentComplete}%;"></div>
                            </div>
                            <p>Complete ${totalLectures - purchasedCount} more lectures to earn your NCLEX Master Certificate!</p>
                        </div>
                    `}
                `;
            }
            
            // ============ RENDER SUPPORT VIEW ============
            async function renderSupport() {
                const contentDiv = document.getElementById('dynamicContent');
                if (!contentDiv) return;
                
                contentDiv.innerHTML = `
                    <div style="background: white; border-radius: 24px; padding: 32px; margin-bottom: 24px; text-align: center;">

                            <i class="fas fa-phone" style="font-size: 32px; color: var(--primary);"></i>
                            <div class="stat-label">Call Us</div>
                            <small>+254 700 000 000</small>
                        </div>
                    </div>
                    
                    <div style="background: white; border-radius: 24px; padding: 28px;">
                        <h3><i class="fas fa-question-circle"></i> Frequently Asked Questions</h3>
                        ${[
                            { q: "How do I access purchased lectures?", a: "After purchase, lectures are automatically unlocked. Click 'My Lectures' in the sidebar to see all unlocked lectures." },
                            { q: "How long do I have access to lectures?", a: "Lifetime access! Once you purchase a lecture or bundle, you have unlimited access forever." },
                            { q: "What payment methods are accepted?", a: "We accept M-Pesa (STK Push), Credit/Debit Cards, and PayPal. All payments are secure." },
                            { q: "Can I get a refund?", a: "We offer a 7-day money-back guarantee for bundle purchases. Individual lectures are non-refundable once accessed." },

                        ].map((faq, i) => `
                            <div style="border-bottom: 1px solid var(--light-gray); padding: 16px 0;">
                                <strong><i class="fas fa-question-circle" style="color: var(--primary); margin-right: 10px;"></i> ${faq.q}</strong>

            // ============ PAYMENT HANDLERS ============
            window.initiateUnlock = async function(lecture) {
                if (!currentUser) return;
                if (userPurchases.includes(lecture.id)) {
                    showToast('Lecture already unlocked!');
                    return;
                }
                pendingLecture = lecture;
                
                document.getElementById('paymentDetails').innerHTML = `
                    <div class="payment-detail-card" style="text-align: center;">
                        <h3>${lecture.title}</h3>
                        <div class="price-tag" style="font-size: 36px;">${formatCurrency(lecture.price)}</div>
                        <p>✓ Lifetime access</p>
                        <p>✓ Study notes included</p>
                    </div>
                `;
                showModal('paymentModal');
            };
            
            window.processMpesaPayment = async function() {
                if (!pendingLecture) return;
                showToast('📱 M-Pesa STK Push sent to your phone');
                setTimeout(async () => {
                    await completePurchase(pendingLecture);
                    closeModal('paymentModal');
                    pendingLecture = null;
                }, 2000);
            };
            
            window.processCardPayment = async function() {
                if (!pendingLecture) return;
                showToast('💳 Redirecting to secure payment gateway...');
                setTimeout(async () => {
                    await completePurchase(pendingLecture);
                    closeModal('paymentModal');
                    pendingLecture = null;
                }, 1500);
            };
            
            async function completePurchase(lecture) {
                await supabase.from('user_purchases').insert([{ user_id: currentUser.id, lecture_id: lecture.id, amount_paid: lecture.price }]);
                const { data: profile } = await supabase.from('profiles').select('total_spent').eq('id', currentUser.id).single();
                await supabase.from('profiles').update({ total_spent: (profile?.total_spent || 0) + lecture.price }).eq('id', currentUser.id);
                showToast(`✅ Successfully unlocked: ${lecture.title}`);
                await loadUserPurchases();
                
                if (currentTab === 'lectures') {
                    await renderLecturesGrid();
                } else if (currentTab === 'dashboard') {
                    await updateStats();
                }
                await updateStats();
            }
            
            window.watchLecture = async function(lectureId) {
                const lecture = allLectures.find(l => l.id === lectureId);
                if (!lecture) return;
                
                if (!userPurchases.includes(lecture.id) && !lecture.is_free) {
                    showToast('Please purchase this lecture first', true);
                    return;
                }
                
                document.getElementById('videoHeader').innerHTML = `<h2><i class="fas fa-video"></i> ${lecture.title}</h2><p>${lecture.duration || '2 hours'} • ${getMonthName(lecture.month)}</p>`;
                document.getElementById('videoContainer').innerHTML = `<iframe src="${lecture.video_url || 'https://www.youtube.com/embed/dQw4w9WgXcQ'}" frameborder="0" allowfullscreen></iframe>`;
                document.getElementById('videoNotes').innerHTML = `<strong><i class="fas fa-sticky-note"></i> Study Notes:</strong><br>${lecture.study_notes || 'Complete NCLEX study guide with practice questions and detailed rationales.'}`;
                showModal('videoModal');
            };
            
            // Update Statistics
            async function updateStats() {
                if (!currentUser) return;
                
                const purchasedCount = userPurchases.length;
                const remaining = 180 - purchasedCount;
                const percent = Math.round((purchasedCount / 180) * 100);
                
                const purchasedEl = document.getElementById('purchasedCount');
                const remainingEl = document.getElementById('remainingLectures');
                const percentEl = document.getElementById('progressPercent');
                const percentLabelEl = document.getElementById('progressPercentLabel');
                const progressBarEl = document.getElementById('progressBar');
                const progressDetailEl = document.getElementById('progressDetailText');
                
                if (purchasedEl) purchasedEl.innerHTML = purchasedCount;
                if (remainingEl) remainingEl.innerHTML = remaining;
                if (percentEl) percentEl.innerHTML = `${percent}%`;
                if (percentLabelEl) percentLabelEl.innerHTML = `${percent}% Complete`;
                if (progressBarEl) progressBarEl.style.width = `${percent}%`;
                
                const { data: profile } = await supabase.from('profiles').select('total_spent').eq('id', currentUser.id).single();
                const totalSpentEl = document.getElementById('totalSpent');
                if (totalSpentEl) totalSpentEl.innerHTML = formatCurrency(profile?.total_spent || 0);
                
                if (progressDetailEl) {
                    if (percent === 100) {
                        progressDetailEl.innerHTML = '🏆 Amazing! You\'ve completed the entire NCLEX course! Ready for the exam!';
                    } else if (percent > 50) {
                        progressDetailEl.innerHTML = '🔥 Excellent progress! You\'re more than halfway there!';
                    } else if (percent > 0) {
                        progressDetailEl.innerHTML = '📚 Keep going! Every lecture brings you closer to becoming an RN.';
                    }
                }
            }
            
            // Navigation Handler
            function setupNavigation() {
                const navItems = document.querySelectorAll('.nav-item');
                const titles = {
                    dashboard: { title: 'Nursing Dashboard', subtitle: 'Track your NCLEX journey to success', icon: 'fa-graduation-cap' },
                    lectures: { title: 'My Lectures', subtitle: 'Access all your NCLEX course materials', icon: 'fa-book-open' },
                    progress: { title: 'Progress Tracker', subtitle: 'Monitor your NCLEX preparation progress', icon: 'fa-chart-line' },
                    certificates: { title: 'Certificates', subtitle: 'View and download your achievements', icon: 'fa-certificate' },
                    support: { title: 'Support Center', subtitle: 'Get help with your NCLEX preparation', icon: 'fa-headset' }
                };
                
                navItems.forEach(item => {
                    item.addEventListener('click', async (e) => {
                        e.preventDefault();
                        const tab = item.getAttribute('data-tab');
                        currentTab = tab;
                        
                        // Update active state
                        navItems.forEach(nav => nav.classList.remove('active'));
                        item.classList.add('active');
                        
                        // Update page title
                        const titleData = titles[tab];
                        const titleEl = document.getElementById('pageMainTitle');
                        const subtitleEl = document.getElementById('pageSubtitle');
                        if (titleEl) titleEl.innerHTML = `<i class="fas ${titleData.icon}"></i> ${titleData.title}`;
                        if (subtitleEl) subtitleEl.textContent = titleData.subtitle;
                        
                        // Render appropriate view
                        switch(tab) {
                            case 'dashboard':
                                await renderDashboard();
                                break;
                            case 'lectures':
                                await renderLectures();
                                break;
                            case 'progress':
                                await renderProgress();
                                break;
                            case 'certificates':
                                await renderCertificates();
                                break;
                            case 'support':
                                await renderSupport();
                                break;
                        }
                    });
                });
            }
            
            // Attach payment button handlers
            function attachPaymentHandlers() {
                const mpesaBtn = document.getElementById('mpesaPayBtn');
                const cardBtn = document.getElementById('cardPayBtn');
                if (mpesaBtn) mpesaBtn.onclick = () => window.processMpesaPayment();
                if (cardBtn) cardBtn.onclick = () => window.processCardPayment();
            }
            
            // Initialize Dashboard
            async function initDashboard() {
                await checkAuth();
                if (!currentUser) return;
                
                await loadLectures();
                await loadUserPurchases();
                
                setupNavigation();
                attachPaymentHandlers();
                
                // Load initial dashboard
                await renderDashboard();
                
                // Set logout handler
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) logoutBtn.onclick = () => window.logout();
            }
            
            initDashboard();
        })();
    </script>
</body>
</html>
